openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Kinross Offer Letter Companion API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: templates
    description: Template profile operations
  - name: offers
    description: Offer letter operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all saved template profiles
      responses:
        "200":
          description: List of template profiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      $ref: "#/components/schemas/TemplateProfile"
                required: [templates]
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Save a template profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateProfile"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a template profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /offers:
    get:
      operationId: listOffers
      tags: [offers]
      summary: List saved offer drafts
      responses:
        "200":
          description: List of offer drafts
          content:
            application/json:
              schema:
                type: object
                properties:
                  offers:
                    type: array
                    items:
                      $ref: "#/components/schemas/OfferDraft"
                required: [offers]
    post:
      operationId: createOffer
      tags: [offers]
      summary: Save an offer draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOfferRequest"
      responses:
        "201":
          description: Offer draft saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferDraft"

  /offers/{id}:
    get:
      operationId: getOffer
      tags: [offers]
      summary: Get an offer draft by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Offer draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferDraft"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateOffer
      tags: [offers]
      summary: Update an offer draft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOfferRequest"
      responses:
        "200":
          description: Offer draft updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferDraft"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteOffer
      tags: [offers]
      summary: Delete an offer draft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    TemplateProfile:
      type: object
      properties:
        id:
          type: integer
        profileName:
          type: string
        baseScenario:
          type: string
        site:
          type: string
        activeFields:
          type: array
          items:
            type: string
        removedFields:
          type: array
          items:
            type: string
        clauseVariantIds:
          type: object
          additionalProperties:
            type: string
        letterheadId:
          type: string
        outputOrder:
          type: array
          items:
            type: string
        defaultSigners:
          type: object
          additionalProperties:
            type: string
        defaultHrContact:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - profileName
        - baseScenario
        - activeFields
        - removedFields
        - clauseVariantIds
        - outputOrder
        - defaultSigners
        - defaultHrContact
        - createdAt
        - updatedAt

    CreateTemplateRequest:
      type: object
      properties:
        profileName:
          type: string
        baseScenario:
          type: string
        site:
          type: string
        activeFields:
          type: array
          items:
            type: string
        removedFields:
          type: array
          items:
            type: string
        clauseVariantIds:
          type: object
          additionalProperties:
            type: string
        letterheadId:
          type: string
        outputOrder:
          type: array
          items:
            type: string
        defaultSigners:
          type: object
          additionalProperties:
            type: string
        defaultHrContact:
          type: object
          additionalProperties:
            type: string
      required:
        - profileName
        - baseScenario
        - activeFields
        - removedFields
        - clauseVariantIds
        - outputOrder
        - defaultSigners
        - defaultHrContact

    OfferDraft:
      type: object
      properties:
        id:
          type: integer
        templateProfileId:
          type: integer
        formData:
          type: object
          additionalProperties: true
        fieldStates:
          type: object
          additionalProperties:
            type: string
        resolvedClauses:
          type: array
          items:
            type: object
            additionalProperties: true
        status:
          type: string
          enum: [draft, generated, exported]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - formData
        - fieldStates
        - resolvedClauses
        - status
        - createdAt
        - updatedAt

    CreateOfferRequest:
      type: object
      properties:
        templateProfileId:
          type: integer
        formData:
          type: object
          additionalProperties: true
        fieldStates:
          type: object
          additionalProperties:
            type: string
        resolvedClauses:
          type: array
          items:
            type: object
            additionalProperties: true
        status:
          type: string
          enum: [draft, generated, exported]
      required:
        - formData
        - fieldStates
        - resolvedClauses
        - status
